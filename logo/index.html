<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGO</title>
    <!-- index.css -->
    <link rel="stylesheet" href="styles/index.css">

    <!-- google font -->
    <<link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"

<body>
    <header>

        <!-- navBar -->
        <nav>
            <div>
                <h3 class="navTitle titleColor">LOGO</h3>
            </div>
            <div>
                <ul>
                    <li><a href="" class="primaryColor">Home</a></li>
                    <li><a href="" class="primaryColor">Contacts</a></li>
                    <li><a href="" class="primaryColor">About Us</a></li>
                    <li><button class="btnPrimary">Sign Up</button></li>

        <!-- banner section -->
        <div class="banner">

            <button class="btnPrimary">Stay Focused</button>

    </header>

    <main>

        <!-- live section -->
        <section class="liveSection">

                <h3 class="primaryColor">See It in Action</h3>
                <p class="textPrimary">Explore the live preview and imagine your brand in this bold new look.</p>

            </div>

            <div class="liveImg">

        </section>

        <!-- active users -->
        <section class="activeUsers">

            <h3>Joined Thousands of Productive Users</h3>
            <div class="userColumn">
                <div>
                    <h3 class="userNum">50K</h3>
                    <p class="userType">Active Users</p>
                </div>
                <div>
                    <h3 class="userNum">2M+</h3>
                    <p class="userType">Focus Sessions</p>
                </div>
                <div>
                    <h3 class="userNum">95%</h3>
                    <p class="userType">Satisfaction Rate</p>
                </div>
            </div>

    <footer>



    </footer>
